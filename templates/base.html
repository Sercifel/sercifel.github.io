<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}}</title>
    <meta name="description" content="{{description}}" />
    <meta name="msvalidate.01" content="A4B0510EB1646757B193F4AC8223858F" />
    <meta property="og:title" content="{{title}}" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:url" content="{{canonical}}" />
    <meta name="color-scheme" content="light" />
    <link rel="icon" href="/assets/favicon.jpg" type="image/jpeg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" />
    <!-- Google Tag Manager -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({
          "gtm.start": new Date().getTime(),
          event: "gtm.js",
        });
        var f = d.getElementsByTagName(s)[0];
        var j = d.createElement(s);
        var dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-P2ZB77SQ");
    </script>
    <!-- End Google Tag Manager -->
    <link rel="stylesheet" href="/assets/site.css" />
  </head>
  <body class="bg-[var(--color-background)] text-[var(--color-text)]">
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-P2ZB77SQ"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <a
      class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-lg focus:bg-white focus:px-4 focus:py-2 focus:text-sm focus:text-slate-900 focus:shadow"
      href="#main-content"
    >
      Skip to main content
    </a>
    <div class="reading-progress" aria-hidden="true">
      <span data-reading-progress></span>
    </div>
    <div id="main-content">
      {{body}}
    </div>
    <div
      id="search-modal"
      class="fixed inset-0 z-50 hidden overscroll-contain bg-slate-950/40 backdrop-blur-xl"
      data-search-modal
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-labelledby="search-modal-title"
    >
      <button
        class="absolute inset-0 bg-transparent"
        type="button"
        data-search-overlay
        aria-label="Close search"
      ></button>
      <div class="relative mx-auto flex min-h-full max-w-3xl items-center justify-center px-6">
        <div class="search-panel flex max-h-[calc(100vh-6rem)] w-full flex-col rounded-2xl border p-6 shadow-xl">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Search</p>
              <h2 class="mt-2 text-xl font-semibold" id="search-modal-title">
                Find a Report or Vendor
              </h2>
            </div>
            <button
              class="rounded-full border border-slate-300 px-3 py-1 text-xs uppercase tracking-[0.2em] transition-colors duration-200 hover:border-blue-600 hover:text-blue-600"
              data-search-close
              type="button"
            >
              Close
            </button>
          </div>
          <input
            class="mt-6 w-full rounded-xl border border-slate-300 px-4 py-3 text-sm"
            type="search"
            name="search"
            autocomplete="off"
            placeholder="Search by company, category, or keyword… e.g. gearboxes"
            data-search-input
            aria-label="Search reports and vendors"
          />
          <p
            class="mt-3 text-xs uppercase tracking-[0.2em] text-slate-400"
            data-search-count
            aria-live="polite"
          ></p>
          <ul class="mt-6 min-h-0 flex-1 space-y-4 overflow-y-auto pr-2" data-search-results></ul>
        </div>
      </div>
    </div>
    {{footer}}
    <script type="module" src="/assets/search.js" defer></script>
    <script src="/assets/nav.js" defer></script>
    <script src="/assets/toc.js" defer></script>
    <script src="/assets/carousel.js" defer></script>
    <script src="/assets/load-more.js" defer></script>
  </body>
</html>
