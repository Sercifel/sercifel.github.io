{{navbar}}
{{breadcrumbs}}
<main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-12">
  <div class="{{gridClass}}">
    {{sidebarColumn}}
    <article>
      <div class="lg:hidden mb-6 rounded border border-slate-200 p-4">
        <button
          type="button"
          class="flex w-full items-center justify-between text-sm font-semibold"
          data-toc-toggle
          aria-expanded="false"
        >
          <span>On this page</span>
          <span class="text-slate-500">Toggle</span>
        </button>
        <div class="mt-3" data-toc-panel hidden aria-hidden="true">
          <ul class="space-y-2 text-sm text-slate-600">{{toc}}</ul>
        </div>
      </div>
      <h1 class="text-3xl font-semibold">{{title}}</h1>
      <p class="text-sm text-slate-500">{{date}}</p>
      <p class="mt-3 text-slate-700">{{description}}</p>
      <div class="prose prose-slate mt-8 max-w-none">{{content}}</div>
      {{related}}
    </article>
    <aside class="hidden lg:block sticky top-24 h-fit">
      <p class="text-sm font-semibold">On this page</p>
      <ul class="mt-2 space-y-2">{{toc}}</ul>
    </aside>
  </div>
</main>
