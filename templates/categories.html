{{navbar}}
{{breadcrumbs}}
<main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-12">
  <div class="grid gap-8 lg:grid-cols-[240px_minmax(0,1fr)]">
    <aside class="h-fit rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <h2 class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Categories</h2>
      <ul class="mt-4 space-y-2 text-sm text-slate-600">
        {{sidebarLinks}}
      </ul>
    </aside>
    <section>
      <h1 class="font-semibold">{{title}}</h1>
      <div class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        {{categoryCards}}
      </div>
      <section class="mt-10" data-latest-section data-pagination-scope>
        <h2 class="font-semibold">Latest in Categories</h2>
        <div class="mt-4" data-latest-list>
          {{latestCategoryList}}
        </div>
        {{latestPagination}}
      </section>
    </section>
  </div>
</main>
