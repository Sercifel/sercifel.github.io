<header class="sticky top-0 z-40 border-b border-slate-200 bg-white/80 backdrop-blur">
  <nav class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-4 sm:px-6" aria-label="Primary">
    <a class="flex items-center" href="/" aria-label="Back to home">
      <img
        class="h-9 w-auto"
        src="/assets/mi-logo.jpg"
        alt="Machinery Insight"
        loading="eager"
      />
    </a>
    <div class="flex items-center gap-2 sm:gap-3">
      <div class="nav-scroll hidden items-center gap-6 whitespace-nowrap pb-1 md:flex">
        <a class="text-sm font-semibold text-slate-700 transition-colors duration-200 hover:text-blue-600" href="/firm-news/">Firm News</a>
        <a class="text-sm font-semibold text-slate-700 transition-colors duration-200 hover:text-blue-600" href="/exhibition/">Exhibitions</a>
        <a class="text-sm font-semibold text-slate-700 transition-colors duration-200 hover:text-blue-600" href="/categories/">Categories</a>
        <a class="text-sm font-semibold text-slate-700 transition-colors duration-200 hover:text-blue-600" href="/about/">About</a>
      </div>
      <button
        class="inline-flex h-11 cursor-pointer items-center gap-2 rounded-full border border-slate-300 px-2 text-xs uppercase tracking-[0.2em] transition-colors duration-200 hover:border-blue-600 hover:text-blue-600 sm:px-4"
        data-search-open
        type="button"
        aria-haspopup="dialog"
        aria-controls="search-modal"
        aria-label="Open search"
      >
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="20" y1="20" x2="16.5" y2="16.5"></line>
        </svg>
        <span class="hidden sm:inline">Search</span>
      </button>
      <button
        class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-slate-300 text-slate-700 transition-colors duration-200 hover:border-blue-600 hover:text-blue-600"
        data-theme-toggle
        type="button"
        aria-label="Toggle dark mode"
      >
        <svg data-theme-icon="light" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="M4.93 4.93l1.41 1.41"></path>
          <path d="M17.66 17.66l1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="M6.34 17.66l-1.41 1.41"></path>
          <path d="M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <svg data-theme-icon="dark" class="hidden h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"></path>
        </svg>
      </button>
      <button
        class="inline-flex h-11 w-11 cursor-pointer items-center justify-center rounded-full border border-slate-300 text-slate-700 transition-colors duration-200 hover:border-blue-600 hover:text-blue-600 md:hidden"
        type="button"
        data-nav-toggle
        aria-controls="primary-navigation"
        aria-expanded="false"
        aria-label="Toggle menu"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="4" y1="7" x2="20" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="20" y2="17"></line>
        </svg>
      </button>
    </div>
  </nav>
  <div class="border-t border-slate-200 bg-white/95 md:hidden" data-nav-menu id="primary-navigation" hidden>
    <div class="mx-auto flex max-w-6xl flex-wrap items-center gap-2 px-4 py-4 sm:px-6">
      <a class="rounded-full border px-3 py-1 text-sm font-medium text-slate-600 hover:border-blue-600 hover:text-blue-600" href="/firm-news/">Firm News</a>
      <a class="rounded-full border px-3 py-1 text-sm font-medium text-slate-600 hover:border-blue-600 hover:text-blue-600" href="/exhibition/">Exhibitions</a>
      <a class="rounded-full border px-3 py-1 text-sm font-medium text-slate-600 hover:border-blue-600 hover:text-blue-600" href="/categories/">Categories</a>
      <a class="rounded-full border px-3 py-1 text-sm font-medium text-slate-600 hover:border-blue-600 hover:text-blue-600" href="/about/">About</a>
    </div>
  </div>
</header>
